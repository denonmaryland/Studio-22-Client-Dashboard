<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio 22 — Engineer Client Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111;--surface2:#181818;--border:#222;--accent:#c8f135;--accent2:#f1c135;--red:#ff4545;--muted:#555;--text:#e8e8e8;--text2:#999}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{padding:40px 40px 0;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100}
.header-top{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;padding-bottom:20px;flex-wrap:wrap}
.studio-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,6vw,72px);letter-spacing:4px;line-height:1;color:var(--accent)}
.studio-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.header-stats{display:flex;gap:32px;flex-wrap:wrap}
.stat{text-align:right}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace}
.nav-tabs{display:flex;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:14px 28px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;user-select:none;background:none;border-left:none;border-right:none;border-top:none}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-count{display:inline-block;background:var(--surface2);color:var(--text2);font-size:10px;padding:1px 6px;border-radius:20px;margin-left:6px}
.nav-tab.active .tab-count{background:var(--accent);color:#000}
main{padding:32px 40px;max-width:1400px;margin:0 auto}
.engineer-panel{display:none}
.engineer-panel.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:3px;line-height:1}
.panel-meta{display:flex;gap:24px;align-items:center}
.panel-stat{text-align:center}
.panel-stat-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1}
.panel-stat-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace}
.controls{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:220px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 16px;font-family:'DM Mono',monospace;font-size:12px;border-radius:4px;outline:none;transition:border-color .2s}
.search-box::placeholder{color:var(--muted)}
.search-box:focus{border-color:var(--accent)}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:10px 16px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--muted);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000}
.legend{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.legend-bar{width:12px;height:12px;border-radius:2px}
.bar-hot{background:var(--accent)}.bar-warm{background:var(--accent2)}.bar-cold{background:var(--red)}
.result-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:16px;letter-spacing:1px}
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color .15s,transform .15s;cursor:pointer}
.client-card:hover{border-color:#444;transform:translateY(-2px);background:#151515}
.client-card.hot{border-left:3px solid var(--accent)}
.client-card.warm{border-left:3px solid var(--accent2)}
.client-card.cold{border-left:3px solid var(--red)}
.client-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);min-width:28px;text-align:center;line-height:1}
.client-info{flex:1;min-width:0}
.client-name{font-weight:500;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.client-dates{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px}
.client-sessions{text-align:right;flex-shrink:0}
.sessions-num{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1;color:var(--text)}
.sessions-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-bottom:2px}
.dot-active{background:var(--accent);box-shadow:0 0 6px var(--accent)}
.dot-recent{background:var(--accent2)}
.dot-inactive{background:var(--red)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:2px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
.modal{background:#141414;border:1px solid #2a2a2a;border-radius:10px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6)}
.modal-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.modal-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1;color:var(--text)}
.modal-eng{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.modal-close:hover{color:var(--text);border-color:var(--muted)}
.modal-body{padding:24px 28px;display:flex;flex-direction:column;gap:16px}
.modal-contact-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;text-decoration:none;transition:border-color .15s,background .15s}
.modal-contact-row:hover{border-color:var(--accent);background:#161616}
.modal-contact-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.icon-phone{background:rgba(200,241,53,.12)}.icon-email{background:rgba(241,193,53,.12)}
.modal-contact-info{flex:1;min-width:0}
.modal-contact-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.modal-contact-value{font-size:14px;color:var(--text);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.phone-val{color:var(--accent)!important;font-family:'DM Mono',monospace!important;font-size:15px!important;letter-spacing:1px!important}
.email-val{color:var(--accent2)!important;font-size:13px!important}
.modal-no-contact{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:10px 16px;border:1px dashed var(--border);border-radius:6px;text-align:center;letter-spacing:1px}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-stat-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;text-align:center}
.modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
.val-sessions{color:var(--accent)}
.val-date{color:var(--text2);font-size:13px;font-family:'DM Mono',monospace}
.modal-stat-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.modal-status-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px}
.modal-status-bar.hot{background:rgba(200,241,53,.08);border:1px solid rgba(200,241,53,.2)}
.modal-status-bar.warm{background:rgba(241,193,53,.08);border:1px solid rgba(241,193,53,.2)}
.modal-status-bar.cold{background:rgba(255,69,69,.08);border:1px solid rgba(255,69,69,.2)}
.modal-status-text{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px}
.hot .modal-status-text{color:var(--accent)}
.warm .modal-status-text{color:var(--accent2)}
.cold .modal-status-text{color:var(--red)}
@media(max-width:600px){header{padding:24px 20px 0}main{padding:24px 20px}.studio-name{font-size:40px}.client-grid{grid-template-columns:1fr}.header-stats{display:none}.modal{max-width:100%}.modal-stats{grid-template-columns:1fr 1fr}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

function sc(d){return d<=30?'hot':d<=90?'warm':'cold'}
function dc(d){return d<=30?'dot-active':d<=90?'dot-recent':'dot-inactive'}
function sl(d){
  if(d===0)return'Active today';
  if(d===1)return'Active yesterday';
  if(d<=30)return d+' days ago \u2014 Active';
  if(d<=90)return d+' days ago \u2014 Recent';
  return d+' days ago \u2014 Inactive';
}
function fd(s){
  if(!s)return'\u2014';
  var p=s.split('-'),mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[+p[1]-1]+' '+(+p[2])+', '+p[0];
}
function fs(s){
  if(!s)return'\u2014';
  var p=s.split('-'),mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[+p[1]-1]+" '"+p[0].slice(2);
}
function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function openModal(eng,idx){
  var c=DATA[eng].clients[idx];
  var s=sc(c.days_inactive);
  document.getElementById('mName').textContent=c.name;
  document.getElementById('mEng').textContent='with '+eng;
  var sb=document.getElementById('mStatus');
  sb.className='modal-status-bar '+s;
  sb.innerHTML='<span style="font-size:14px">'+(s==='hot'?'&#x1F7E2;':s==='warm'?'&#x1F7E1;':'&#x1F534;')+'</span><span class="modal-status-text">'+sl(c.days_inactive)+'</span>';
  document.getElementById('mStats').innerHTML=
    '<div class="modal-stat-box"><div class="modal-stat-val val-sessions">'+c.sessions+'</div><div class="modal-stat-lbl">Sessions</div></div>'+
    '<div class="modal-stat-box"><div class="modal-stat-val val-date">'+fs(c.first_session)+'</div><div class="modal-stat-lbl">First Visit</div></div>'+
    '<div class="modal-stat-box"><div class="modal-stat-val val-date">'+fs(c.last_session)+'</div><div class="modal-stat-lbl">Last Visit</div></div>';
  var h='';
  if(c.phone){
    var t=c.phone.replace(/[^0-9]/g,'');
    h+='<a class="modal-contact-row" href="tel:+1'+t+'"><div class="modal-contact-icon icon-phone">&#128222;</div><div class="modal-contact-info"><div class="modal-contact-label">Phone</div><div class="modal-contact-value phone-val">'+esc(c.phone)+'</div></div></a>';
  }
  if(c.email){
    h+='<a class="modal-contact-row" href="mailto:'+esc(c.email)+'"><div class="modal-contact-icon icon-email">&#9993;&#65039;</div><div class="modal-contact-info"><div class="modal-contact-label">Email</div><div class="modal-contact-value email-val">'+esc(c.email)+'</div></div></a>';
  }
  if(!c.phone&&!c.email)h='<div class="modal-no-contact">No contact info on file</div>';
  document.getElementById('mContacts').innerHTML=h;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('mClose').addEventListener('click',closeModal);
  document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
  buildUI();
});

function buildUI(){

      document.getElementById('f-'+f+'-'+eid).addEventListener('click',function(){
        if(aEng!==eng)return;
        aFilt=f; aQ=''; document.getElementById('s-'+eid).value='';
        ['all','hot','warm','cold'].forEach(function(x){
          document.getElementById('f-'+x+'-'+eid).classList.toggle('active',x===f);
        });
        renderGrid(eng);
      });
    });
  });
  renderGrid(aEng);
}
function renderGrid(eng){
  var eid=eng.replace(/ /g,'_');
  var grid=document.getElementById('g-'+eid);
  var cnt=document.getElementById('cnt-'+eid);
  if(!grid)return;
  var cl=DATA[eng].clients;
  var q=(aQ||'').toLowerCase();
  var filt=[];
  for(var i=0;i<cl.length;i++){
    var c=cl[i];
    if(q&&c.name.toLowerCase().indexOf(q)<0)continue;
    if(aFilt!=='all'&&sc(c.days_inactive)!==aFilt)continue;
    filt.push({c:c,i:i});
  }
  cnt.textContent=filt.length+' client'+(filt.length!==1?'s':'')+' shown';
  grid.innerHTML='';
  if(!filt.length){grid.innerHTML='<div class="empty-state">NO CLIENTS MATCH</div>';return;}
  filt.forEach(function(obj){
    var c=obj.c,i=obj.i,s=sc(c.days_inactive),d=dc(c.days_inactive);
    var card=document.createElement('div');
    card.className='client-card '+s;
    card.title='Tap to view contact info';
    card.innerHTML=
      '<div class="client-rank">'+(i+1)+'</div>'+
      '<div class="client-info">'+
        '<div class="client-name">'+esc(c.name)+'</div>'+
        '<div class="client-dates">First: '+fd(c.first_session)+'<br>Last: '+fd(c.last_session)+'</div>'+
      '</div>'+
      '<div class="client-sessions">'+
        '<div class="status-dot '+d+'" style="margin-left:auto;margin-bottom:4px"></div>'+
        '<div class="sessions-num">'+c.sessions+'</div>'+
        '<div class="sessions-label">session'+(c.sessions!==1?'s':'')+'</div>'+
      '</div>';
    (function(e,idx){card.addEventListener('click',function(){openModal(e,idx);});})(eng,i);
    grid.appendChild(card);
  });
}
function switchEng(eng){
  aEng=eng; aFilt='all'; aQ='';
  var eid=eng.replace(/ /g,'_');
  var sb=document.getElementById('s-'+eid);
  if(sb)sb.value='';
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.toggle('active',t.dataset.eng===eng);});
  document.querySelectorAll('.engineer-panel').forEach(function(p){p.classList.toggle('active',p.id==='pnl-'+eid);});
  ['all','hot','warm','cold'].forEach(function(f){
    var b=document.getElementById('f-'+f+'-'+eid);
    if(b)b.classList.toggle('active',f==='all');
  });
  renderGrid(eng);
}
</script>
